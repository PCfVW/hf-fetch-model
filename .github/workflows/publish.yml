name: Publish to crates.io

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      # Full CI checks before publishing
      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test

      - name: Doc check
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      # Publish
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Update candle-mi dependency
      - name: Update hf-fetch-model version in candle-mi
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          git clone https://x-access-token:${{ secrets.CANDLE_MI_PAT }}@github.com/PCfVW/candle-mi.git /tmp/candle-mi
          cd /tmp/candle-mi
          sed -i "s/hf-fetch-model = { version = \"[^\"]*\"/hf-fetch-model = { version = \"${VERSION}\"/" Cargo.toml
          cargo update -p hf-fetch-model
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git diff --cached --quiet || git commit -m "chore: bump hf-fetch-model to v${VERSION}" && git push
