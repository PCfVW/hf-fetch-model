version: 2
updates:
  # Rust crate dependencies — weekly, grouped so routine patch bumps land as
  # one PR rather than a swarm. Security updates are exempt from grouping and
  # complement the `cargo audit` CI job (audit fails the build; Dependabot
  # opens the fix PR).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # reqwest 0.13 changed the API (RequestBuilder::query removed) and
      # conflicts with hf-hub 0.5's reqwest 0.12. Deferred until hf-hub 1.0
      # stable ships to crates.io. Patch updates within 0.12.x are still
      # allowed; this only holds back 0.13.0+. Re-evaluate when hf-hub 1.0 lands.
      - dependency-name: reqwest
        versions: [">=0.13.0"]

  # GitHub Actions used by the CI / publish workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
