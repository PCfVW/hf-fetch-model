[package]
name = "hf-fetch-model"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
description = "Fast HuggingFace model downloads for Rust — an embeddable library for downloading HuggingFace models with maximum throughput"
license = "MIT OR Apache-2.0"
repository = "https://github.com/PCfVW/hf-fetch-model"
keywords = ["huggingface", "download", "model", "machine-learning"]
categories = ["network-programming", "science"]

[dependencies]
hf-hub = { version = "0.5", features = ["tokio"] }
thiserror = "2"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

[lints.rust]
unsafe_code = "forbid"
elided_lifetimes_in_paths = "deny"

[lints.clippy]
# Rule 3: No panics
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
indexing_slicing = "deny"

# Rule 7: Exhaustive matching
wildcard_enum_match_arm = "deny"

# Rule 2: Explicit conversions
as_conversions = "warn"

# Rule 9: Prefer iterators
explicit_iter_loop = "warn"
manual_filter_map = "warn"
manual_find_map = "warn"
needless_range_loop = "warn"

# Rule 17: #[must_use]
must_use_candidate = "warn"

# Additional strictness
pedantic = { level = "warn", priority = -1 }
missing_errors_doc = "warn"
missing_panics_doc = "warn"

# Allow noisy pedantic lints
module_name_repetitions = "allow"
too_many_lines = "allow"
